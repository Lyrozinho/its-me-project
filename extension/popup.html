<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Love Hyro</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0B0715;
        color: #fff;
        padding: 20px;
      }
      h1 { font-size: 16px; margin: 0 0 6px; }
      p { font-size: 12px; color: rgba(255,255,255,0.6); margin: 0 0 16px; }
      input {
        width: 100%;
        box-sizing: border-box;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        color: #fff;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        background: #5B3DF5;
        border: 0;
        color: #fff;
        padding: 10px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #6a4cf7; }
      .status { margin-top: 12px; font-size: 12px; color: #A78BFA; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Love Hyro</h1>
    <p>Ative sua licença para congelar créditos.</p>
    <input id="key" placeholder="Chave da licença" />
    <input id="pass" placeholder="Senha" type="password" />
    <button id="activate">Ativar</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
